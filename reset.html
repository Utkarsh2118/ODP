<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Storage - DonateSphere Admin</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .container {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 500px;
        width: 100%;
      }

      h1 {
        color: #2c3e50;
        margin-bottom: 1rem;
        text-align: center;
      }

      .info-box {
        background: #f0f9ff;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        border-left: 4px solid #3498db;
      }

      .info-box p {
        color: #2c3e50;
        font-size: 14px;
        line-height: 1.6;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #2c3e50;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #bdc3c7;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
      }

      input:focus {
        outline: none;
        border-color: #0f766e;
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
      }

      .button-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 2rem;
      }

      button {
        padding: 0.8rem;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-clear {
        background-color: #e74c3c;
        color: white;
      }

      .btn-clear:hover {
        background-color: #c0392b;
      }

      .btn-create {
        background-color: #27ae60;
        color: white;
      }

      .btn-create:hover {
        background-color: #229954;
      }

      .btn-secondary {
        background-color: #95a5a6;
        color: white;
        grid-column: 1 / -1;
      }

      .btn-secondary:hover {
        background-color: #7f8c8d;
      }

      .message {
        padding: 1rem;
        border-radius: 6px;
        margin-top: 1rem;
        display: none;
      }

      .message.show {
        display: block;
      }

      .message.success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .message.error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .message.info {
        background-color: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }

      .stats {
        background: #f8f9fa;
        padding: 1rem;
        border-radius: 6px;
        margin-bottom: 1rem;
      }

      .stat-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        color: #2c3e50;
        font-size: 14px;
      }

      .stat-item strong {
        color: #0f766e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔄 Storage Reset</h1>

      <div class="info-box">
        <p>
          <strong>Clear all data:</strong> This will delete all users and data
          from localStorage.
        </p>
        <p style="margin-top: 0.8rem;">
          <strong>Create new admin:</strong> After clearing, set up a fresh
          admin account with your credentials.
        </p>
      </div>

      <!-- Stats -->
      <div class="stats" id="stats">
        <div class="stat-item">
          <span>Total Users:</span>
          <strong id="stat-users">0</strong>
        </div>
        <div class="stat-item">
          <span>Data Size:</span>
          <strong id="stat-size">0 KB</strong>
        </div>
      </div>

      <!-- Create Admin Form -->
      <div class="form-group">
        <label for="admin-name">Admin Name</label>
        <input type="text" id="admin-name" placeholder="e.g., Admin" value="Admin" />
      </div>

      <div class="form-group">
        <label for="admin-email">Admin Email</label>
        <input
          type="email"
          id="admin-email"
          placeholder="e.g., admin@example.com"
          value="admin@example.com"
        />
      </div>

      <div class="form-group">
        <label for="admin-password">Admin Password</label>
        <input
          type="password"
          id="admin-password"
          placeholder="e.g., password123"
          value="password123"
          minlength="6"
        />
      </div>

      <div class="button-group">
        <button class="btn-clear" id="clear-btn">Clear All Data</button>
        <button class="btn-create" id="create-btn">Create Admin</button>
        <button class="btn-secondary" id="finish-btn">Done & Go to Login</button>
      </div>

      <div id="message" class="message"></div>
    </div>

    <script src="assets/js/localStorage.js"></script>
    <script>
      /**
       * Show message
       */
      function showMessage(text, type = "info") {
        const msgEl = document.getElementById("message");
        msgEl.textContent = text;
        msgEl.className = `message show ${type}`;
      }

      /**
       * Update stats
       */
      function updateStats() {
        const users = StorageManager.getAllUsers();
        const rawUsers = localStorage.getItem("odp_users") || "[]";
        const storageSize = new Blob([rawUsers]).size;

        document.getElementById("stat-users").textContent = users.length;
        document.getElementById("stat-size").textContent = (storageSize / 1024).toFixed(2);
      }

      /**
       * Clear all data
       */
      document.getElementById("clear-btn").addEventListener("click", () => {
        if (!confirm("Are you sure? This will delete ALL users and data!")) {
          return;
        }

        StorageManager.clearAll();
        showMessage("✓ All data cleared successfully!", "success");
        updateStats();
      });

      /**
       * Create new admin
       */
      document.getElementById("create-btn").addEventListener("click", () => {
        const name = document.getElementById("admin-name").value.trim();
        const email = document.getElementById("admin-email").value.trim();
        const password = document.getElementById("admin-password").value;

        if (!name || !email || !password) {
          showMessage("Please fill in all fields", "error");
          return;
        }

        if (password.length < 6) {
          showMessage("Password must be at least 6 characters", "error");
          return;
        }

        // First clear all data
        StorageManager.clearAll();

        // Create new admin
        const result = StorageManager.addUser({
          name,
          email,
          password,
          role: "admin",
        });

        if (!result.success) {
          showMessage(result.message || "Error creating admin", "error");
          return;
        }

        showMessage(
          `✓ Admin created successfully!\n\nEmail: ${email}\nPassword: ${password}`,
          "success"
        );

        updateStats();
      });

      /**
       * Go to login
       */
      document.getElementById("finish-btn").addEventListener("click", () => {
        window.location.href = "auth.html";
      });

      // Initialize on load
      updateStats();
      console.log("Reset page loaded");
    </script>
  </body>
</html>
