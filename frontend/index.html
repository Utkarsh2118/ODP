<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore Campaigns - DonateSphere</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body class="campaigns-page">
    <!-- Navigation Bar -->
    <header class="navbar">
      <div class="navbar-container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-heart"></i>
          DonateSphere
        </a>
        <nav class="navbar-actions" id="nav-auth-slot">
          <a href="auth.html" class="nav-btn" id="login-btn">
            <i class="fas fa-right-to-bracket"></i> Login
          </a>
          <a href="auth.html" class="nav-btn nav-logout" id="signup-btn">
            <i class="fas fa-user-plus"></i> Sign Up
          </a>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <!-- Page Header -->
      <section class="page-header">
        <div class="container">
          <h1 class="page-title">Explore Campaigns</h1>
          <p class="page-subtitle">Discover and support verified causes in your community</p>
        </div>
      </section>

      <!-- Search & Filter Section -->
      <section class="search-section">
        <div class="container">
          <div class="search-filter-compact">
            <!-- Search Box -->
            <div class="search-box-compact">
              <i class="fas fa-search"></i>
              <input 
                type="text" 
                id="search-input" 
                class="search-input-compact" 
                placeholder="Search by title or cause..."
                aria-label="Search campaigns"
              />
              <button class="search-clear-btn" id="search-clear" aria-label="Clear search" title="Clear search">
                <i class="fas fa-times"></i>
              </button>
            </div>

            <!-- Filters -->
            <div class="filters-row">
              <div class="filter-item">
                <select id="category-filter" class="filter-select-compact" aria-label="Filter campaigns by category" title="Filter campaigns by category">
                  <option value="">All Categories</option>
                  <option value="medical">Medical</option>
                  <option value="education">Education</option>
                  <option value="disaster">Disaster Relief</option>
                  <option value="community">Community</option>
                  <option value="environment">Environment</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <div class="filter-item">
                <select id="sort-filter" class="filter-select-compact" aria-label="Sort campaigns" title="Sort campaigns">
                  <option value="newest">Newest First</option>
                  <option value="most-funded">Most Funded</option>
                  <option value="most-urgent">Most Urgent</option>
                  <option value="closing-soon">Closing Soon</option>
                </select>
              </div>

              <button class="reset-btn-compact" id="reset-filters" aria-label="Reset filters" title="Reset filters">
                <i class="fas fa-redo"></i>
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- Campaign Grid Section -->
      <section class="campaigns-section">
        <div class="container">
          <!-- Loading Skeleton & Campaign Grid -->
          <div class="campaigns-grid" id="campaign-list">
            <div class="campaign-skeleton"></div>
            <div class="campaign-skeleton"></div>
            <div class="campaign-skeleton"></div>
          </div>

          <!-- Empty State -->
          <div class="empty-state is-hidden" id="empty-state">
            <div class="empty-state-icon">
              <i class="fas fa-search"></i>
            </div>
            <h3>No campaigns found</h3>
            <p>Try adjusting your search or filters</p>
            <button class="btn-reset-empty" id="reset-all">
              <i class="fas fa-redo"></i> Reset Filters
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- Scripts -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/home.js"></script>
  </body>
</html>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/home.js"></script>
  </body>
</html>
