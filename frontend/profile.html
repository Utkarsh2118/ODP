<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - DonateSphere</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body class="dash-page">
    <div class="dash-shell">
      <aside class="dash-sidebar" id="dash-sidebar">
        <a class="dash-brand" href="index.html">
          <i class="fa-solid fa-hand-holding-heart"></i>
          <span>DonateSphere</span>
        </a>

        <nav class="dash-nav">
          <a class="dash-nav-item" href="dashboard.html">
            <i class="fa-solid fa-table-columns"></i>
            <span>Dashboard</span>
          </a>
          <a class="dash-nav-item" href="donations.html">
            <i class="fa-solid fa-receipt"></i>
            <span>My Donations</span>
          </a>
          <a class="dash-nav-item" href="index.html">
            <i class="fa-solid fa-bullseye"></i>
            <span>Campaigns</span>
          </a>
          <a class="dash-nav-item active" href="profile.html">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
          </a>
        </nav>

        <button class="dash-logout side" id="side-logout-btn" type="button">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout</span>
        </button>
      </aside>

      <div class="dash-main">
        <header class="dash-topbar">
          <div class="dash-topbar-left">
            <button id="sidebar-toggle" class="icon-btn" type="button" aria-label="Toggle sidebar">
              <i class="fa-solid fa-bars"></i>
            </button>
            <div>
              <h1>My Profile</h1>
              <p>Manage your personal details and password</p>
            </div>
          </div>

          <div class="dash-topbar-right">
            <button id="theme-toggle" class="icon-btn" type="button" aria-label="Toggle dark mode">
              <i class="fa-solid fa-moon"></i>
            </button>
            <button class="icon-btn" type="button" aria-label="Notifications">
              <i class="fa-regular fa-bell"></i>
            </button>

            <div class="user-pill">
              <div class="avatar" id="top-user-avatar">U</div>
              <span id="top-user-name">User</span>
            </div>

            <button class="dash-logout top" id="top-logout-btn" type="button">Logout</button>
          </div>
        </header>

        <main class="dash-content">
          <section class="panel dash-panel profile-panel" id="profile-section">
            <div class="panel-head">
              <h2>Profile</h2>
              <button class="btn btn-outline btn-press" id="edit-profile-btn" type="button">
                <i class="fa-solid fa-pen"></i> Edit Profile
              </button>
            </div>

            <div class="profile-layout">
              <aside class="profile-card">
                <div class="profile-avatar-wrap">
                  <img id="profile-avatar-img" alt="Profile avatar" class="is-hidden" />
                  <div id="profile-avatar-fallback" class="profile-avatar-fallback">U</div>
                </div>
                <p class="profile-name" id="profile-name-display">User</p>
                <p class="profile-email" id="profile-email-display">-</p>

                <label for="profile-image-file" class="btn btn-outline btn-press profile-upload-btn" id="profile-upload-trigger">
                  <i class="fa-solid fa-upload"></i> Upload Photo
                </label>
                <input id="profile-image-file" type="file" accept="image/*" class="is-hidden" />
              </aside>

              <div class="profile-forms-wrap">
                <form id="profile-form" class="profile-form">
                  <div class="field-grid">
                    <div>
                      <label for="profile-name">Full Name</label>
                      <input id="profile-name" name="name" type="text" required disabled />
                    </div>

                    <div>
                      <label for="profile-email">Email</label>
                      <input id="profile-email" name="email" type="email" disabled />
                    </div>

                    <div>
                      <label for="profile-phone">Phone Number</label>
                      <input id="profile-phone" name="phone" type="tel" placeholder="e.g. +91 9876543210" disabled />
                    </div>

                    <div>
                      <label for="profile-address">Address</label>
                      <input id="profile-address" name="address" type="text" placeholder="Enter your address" disabled />
                    </div>

                    <div class="field-full">
                      <label for="profile-bio">Bio</label>
                      <textarea id="profile-bio" name="bio" rows="3" placeholder="Tell us about yourself" disabled></textarea>
                    </div>
                  </div>

                  <div class="profile-actions is-hidden" id="profile-actions">
                    <button class="btn btn-primary btn-press" type="submit">Save Changes</button>
                    <button class="btn btn-outline btn-press" id="cancel-profile-btn" type="button">Cancel</button>
                  </div>

                  <p class="message" id="profile-message"></p>
                </form>

                <form id="password-form" class="profile-form password-form">
                  <h3>Change Password</h3>
                  <div class="field-grid">
                    <div>
                      <label for="old-password">Old Password</label>
                      <input id="old-password" type="password" required />
                    </div>
                    <div>
                      <label for="new-password">New Password</label>
                      <input id="new-password" type="password" minlength="6" required />
                    </div>
                    <div>
                      <label for="confirm-password">Confirm New Password</label>
                      <input id="confirm-password" type="password" minlength="6" required />
                    </div>
                  </div>

                  <div class="profile-actions show">
                    <button class="btn btn-primary btn-press" type="submit">Update Password</button>
                  </div>

                  <p class="message" id="password-message"></p>
                </form>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/profile.js"></script>
  </body>
</html>
